<div class="cart-container">
  
  <header class="cart-header">
    <a routerLink="/categorias" class="back-link">← Volver</a>
    <button class="empty-btn" (click)="vaciarCarrito()">🗑️ Vaciar</button>
  </header>

  <h2 class="cart-title">🛒 MI PEDIDO</h2>

  <div class="items-list" *ngIf="cartItems.length > 0; else carritoVacio">
    
    <div class="cart-card" *ngFor="let item of cartItems">
      <h3 class="item-name">🧶 {{ item.name }}</h3>
      
      <div class="item-controls">
        <div class="quantity-box">
          <button (click)="restarCantidad(item)">-</button>
          
          <span class="quantity-value">{{ item.quantity }}</span>
          
          <button 
            (click)="sumarCantidad(item)" 
            [disabled]="item.quantity >= item.stock"
            [class.disabled-btn]="item.quantity >= item.stock"
          >
            +
          </button>
        </div>
        
        <span class="item-price">${{ item.price * item.quantity }}</span>
      </div>
      
      <button class="remove-btn" (click)="eliminarItem(item.id)">[🗑️ Eliminar]</button>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal</span>
        <span>${{ totalPedido }}</span>
      </div>
      <div class="summary-row total-row">
        <span>TOTAL</span>
        <span>${{ totalPedido }}</span>
      </div>
    </div>

    <button class="continue-btn" routerLink="/checkout-datos">✅ CONTINUAR</button>
  </div>

  <ng-template #carritoVacio>
    <div class="empty-state">
      <p>Tu carrito está vacío.</p>
      <a routerLink="/categorias" class="continue-btn" style="text-decoration:none; display:inline-block;">Ir a ver amigurumis</a>
    </div>
  </ng-template>

</div>
