<section class="carousel-section">

  <div class="carousel-container-real">

    <button
      class="carousel-control prev"
      (click)="prevSlide()"
      *ngIf="carouselImages.length > 1">
      ❮
    </button>

    <div class="carousel-slide">

      <img
        *ngIf="carouselImages[currentIndex]"
        [src]="'http://localhost:3000' + carouselImages[currentIndex].imageUrl"
        [alt]="carouselImages[currentIndex].name"
        class="carousel-image"
        (error)="logError($event)">

    </div>

    <button
      class="carousel-control next"
      (click)="nextSlide()"
      *ngIf="carouselImages.length > 1">
      ❯
    </button>

  </div>

</section>


   <section class="products-section">
    <h2>¡Amigurumis Recomendados!</h2>
    <div class="products-grid">
        <app-product-card 
            *ngFor="let prod of recommendedProducts" 
            [product]="prod">
        </app-product-card>
    </div>
</section>

    <section class="categories-section">
        <h2>Explora Nuestras Categorías</h2>
        <div class="categories-container">
            <div class="categories-grid">
                <div class="category-item" *ngFor="let cat of categories">
                    <div class="icon-circle" [style.backgroundColor]="cat.color">
                        <span class="emoji-icon">{{ cat.icon }}</span>
                    </div>
                    <h3>{{ cat.name }}</h3>
                </div>
            </div>
            <button class="view-more-btn" routerLink="/categorias">Ver Más Categorías →</button>
        </div>
    </section>
